spring:
  application:
    name: recipe.app
  datasource:
    url: jdbc:postgresql://localhost:5432/recipedb
    username: recipeuser
    password: recipepass
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
